{{define "graph"}}
{{$p := .Project}}
<!doctype html>
<html lang="id">
<head>{{template "head"}}</head>
<body>
{{template "nav" .}}
<main class="wrap">
  <h1>Graph <small>(project: {{$p}})</small></h1>
  <div class="filters">
    <input id="gsearch" type="search" placeholder="filter node name…">
    <span id="gtypes"></span>
    <span class="muted" id="gcount"></span>
  </div>
  <p class="muted">Klik ganda node → buka entity. Warna = type. Centang type / ketik untuk memfilter.</p>
  <div id="network"></div>
</main>
<script src="/static/vis-network.min.js"></script>
<script>
var COLORS = { person: "#e88", project: "#4f8cff", decision: "#f55", tool: "#5fb88f", concept: "#a86", place: "#fa3" };
fetch("/ui/graph.json?p={{$p}}").then(function (r) { return r.json(); }).then(function (data) {
  var allNodes = data.nodes || [];
  var allEdges = data.edges || [];
  var nodesDS = new vis.DataSet();
  var edgesDS = new vis.DataSet();
  var network = new vis.Network(document.getElementById("network"), { nodes: nodesDS, edges: edgesDS }, {
    groups: COLORS,
    nodes: { shape: "dot", size: 16, font: { color: "#fff", size: 13 } },
    edges: { font: { size: 11, color: "#9aa" }, color: { color: "#555", highlight: "#4f8cff" },
             arrows: { to: { enabled: true, scaleFactor: 0.5 } }, smooth: { type: "continuous" } },
    interaction: { hover: true }
  });
  network.on("doubleClick", function (e) {
    if (e.nodes.length) {
      var n = allNodes.find(function (x) { return x.id === e.nodes[0]; });
      if (n) { location.href = "/ui/entity?name=" + encodeURIComponent(n.label) + "&p={{$p}}"; }
    }
  });

  // Build colored type checkboxes from distinct types in data.
  var types = {};
  allNodes.forEach(function (n) { types[n.group] = true; });
  var tspan = document.getElementById("gtypes");
  Object.keys(types).sort().forEach(function (t) {
    var label = document.createElement("label");
    label.style.marginLeft = "8px";
    label.style.color = COLORS[t] || "#fff";
    var cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = true; cb.dataset.type = t;
    cb.addEventListener("change", render);
    label.appendChild(cb);
    label.appendChild(document.createTextNode(" " + t));
    tspan.appendChild(label);
  });

  var search = document.getElementById("gsearch");
  search.addEventListener("input", render);

  function checkedType(t) {
    var cb = document.querySelector('input[data-type="' + t + '"]');
    return cb ? cb.checked : true;
  }
  function render() {
    var visIds = {};
    var vn = allNodes.filter(function (n) {
      var q = search.value.trim().toLowerCase();
      if (!checkedType(n.group)) return false;
      if (q && n.label.toLowerCase().indexOf(q) < 0) return false;
      visIds[n.id] = true; return true;
    });
    nodesDS.clear(); nodesDS.update(vn);
    var ve = allEdges.filter(function (e) { return visIds[e.from] && visIds[e.to]; })
      .map(function (e) { return { from: e.from, to: e.to, label: e.label, arrows: "to" }; });
    edgesDS.clear(); edgesDS.update(ve);
    document.getElementById("gcount").textContent = vn.length + "/" + allNodes.length + " nodes";
  }
  render();
});
</script>
</body>
</html>
{{end}}
