services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory_local_dev_password
      POSTGRES_DB: memory
    volumes:
      - memory_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # Model is pulled on first use; pre-pull via: docker compose exec ollama ollama pull bge-m3
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 30s
      retries: 10

  mcp-memory:
    build: .
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      db:
        condition: service_started
    environment:
      DATABASE_URL: postgres://memory:memory_local_dev_password@db:5432/memory
      MEMORY_API_TOKEN: local-dev-token-change-me
      OLLAMA_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: bge-m3
      BACKUP_CRON: "@daily"
      BACKUP_DIR: /data/backups
      BACKUP_RETENTION: "7"
      PORT: 3000
    volumes:
      - mcp_backup_data:/data/backups
    # ports:
    #   - "3000:3000"

volumes:
  memory_db_data:
  ollama_data:
  mcp_backup_data:
